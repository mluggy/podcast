# =============================================================================
# Podcast Configuration
# =============================================================================
# This file is the single source of truth for all podcast metadata.
# It drives the website, RSS feed, OG images, and build scripts.
# Edit values here - they propagate everywhere automatically.
#
# Minimal setup: fill in title, description, author, owner_email, language,
# and country. Everything else has sensible defaults. The canonical URL is
# derived from the incoming request at serve time - no site_url needed.

# -- Show metadata --
# Podcast name - shown in the header, RSS feed, downloaded files, and
# browser tab.
title: הפודקאסט של מיכאל

# Short tagline - appears under the title and in meta description tags.
description: פודקאסט על AI, למידת מכונה, בינה מלאכותית, תכנות וטכנולוגיה

# Host name - used in RSS <itunes:author>, JSON-LD, and the site footer.
author: מיכאל לוגסי

# Required by Apple Podcasts for the <itunes:owner> RSS tag.
# This email is not displayed publicly on the site.
owner_email: michael@lugassy.net

# Path to the podcast cover art. Apple Podcasts requires minimum 1400×1400.
# Favicons and icon sizes are auto-generated from this image on each build.
cover: /cover.jpg

# -- Language & region --
# BCP-47 language code - sets <html lang>, RSS <language>, and JSON-LD.
# Text direction (RTL/LTR) is auto-detected from this value.
# RTL is applied for: he, ar, fa, ur, yi, ps, sd, ckb, syr.
# Examples: en, he, ar, fr, de, ja, zh
language: he

# ISO 3166-1 alpha-2 country code - used to derive og:locale (e.g. en_US)
# and Apple Podcasts episode URLs (e.g. podcasts.apple.com/us/...).
# Examples: US, IL, GB, DE, FR, JP
country: IL

# -- Legal --
# Shown in the site footer and RSS <copyright> tag.
copyright: מיכאל לוגסי

# Content license for the podcast (e.g. "CC-BY-4.0", "All rights reserved").
# Appears in the RSS <podcast:license> tag. Leave empty to omit.
license: ""

# Apple Podcasts advisory - true marks the entire show as explicit.
explicit: false

# -- RSS feed settings --
# "episodic" (standalone episodes, newest first) or
# "serial" (sequential, oldest first).
itunes_type: episodic

# Publisher name for the RSS <podcast:publisher> tag.
# If empty, falls back to the author name above.
publisher: ""

# How often the feed is updated (e.g. "weekly", "daily", "biweekly").
# Appears in the RSS <podcast:updateFrequency> tag. Leave empty to omit.
update_frequency: "biweekly"

# Permanent GUID for the podcast (Podcast Index / podcast:guid tag).
# ⚠️  IMPORTANT - SET THIS BEFORE YOU PUBLISH. Leaving it empty omits the
# <podcast:guid> tag entirely, which means apps have no stable identifier
# for your show. If your feed URL ever changes, apps may treat the feed as
# a brand-new podcast and your subscribers will be orphaned.
#
# 🚨 MIGRATING FROM ANOTHER PLATFORM? This is CRITICAL. If your old feed
# already exposes a <podcast:guid>, you MUST copy that exact value here -
# otherwise Podcast Index-aware apps (Fountain, Podverse, PodcastGuru, etc.)
# will disconnect existing subscribers from your show history. Check your
# old feed's <channel> for a <podcast:guid>...</podcast:guid> tag first.
#
# If you have no prior GUID, generate a fresh UUIDv4 at:
# https://www.uuidgenerator.net/version4
# Once set and published, NEVER change it.
podcast_guid: "df3d886a-09fe-5bd0-ae7c-d8eae75a6bf2"

# Apple Podcasts categories for directory placement.
# Browse: https://podcasters.apple.com/support/1691-apple-podcasts-categories
# Use a plain string for top-level, or Category: Subcategory for nested:
# - Technology
# - News: Tech News
# - Business: Tech
itunes_categories:
  - Technology
  - "News: Tech News"
  - Business

# -- Platform links --
# These appear as icons in the header and in the JSON-LD sameAs array.
# Leave empty or remove a line to hide that platform icon.

# Spotify show ID - the last part of your Spotify show URL:
# open.spotify.com/show/{THIS_ID}. Used to construct the show URL and
# header icon link automatically.
spotify_id: "0DXqxJK0Px4BAb9tkffwLB"

# Numeric Apple Podcasts ID - used to construct the show URL and
# per-episode deep links automatically. Find it in your Apple Podcasts
# Connect dashboard or in the show URL: podcasts.apple.com/.../id{THIS_NUMBER}
apple_podcasts_id: "1819255760"

# YouTube playlist ID - the value after "list=" in a playlist URL:
# youtube.com/playlist?list={THIS_ID}. Used to construct the show URL.
# Per-episode deep links use the episode's youtube_id from episodes.yaml
# to link to the specific video within this playlist.
youtube_id: "PLiIMhiebmscqkdOw6l8HHe9oQFG87pLVe"

# Amazon Music podcast ID - the last part of your Amazon URL:
# music.amazon.com/podcasts/{THIS_ID}. Used to construct the show URL
# and header icon link automatically.
amazon_music_id: "f5b58fea-ad3b-4f05-b6f5-f00e3f8bbf7e"

# -- Social links --
# Shown as icons in the site footer and included in JSON-LD sameAs.
# Leave empty to hide.

# X/Twitter handle without the @ sign (e.g. "mluggy"). Used to construct
# the profile URL and twitter:site meta tag.
x_username: "mluggy"

# Facebook page or profile username (e.g. "mluggy"). The part after
# facebook.com/ in your page URL. Also enables Facebook share buttons
# on episodes.
facebook_username: ""

# Instagram handle without the @ sign (e.g. "mluggy").
instagram_username: ""

# TikTok handle without the @ sign (e.g. "mluggy").
tiktok_username: ""

# Full URL to your LinkedIn profile or page
# (e.g. "https://www.linkedin.com/in/mluggy/").
linkedin_url: "https://www.linkedin.com/in/mluggy/"

# -- Player defaults --
# Initial playback speed when a listener first visits the site. They can
# change it via the speed button; their choice is saved in localStorage.
# Available speeds: 0.8, 1, 1.2, 1.5, 2
default_speed: 1.2

# Whether subtitles (closed captions) are on by default on first visit.
# Users can toggle via the CC button; their choice is saved in localStorage.
default_cc: true

# -- Share platforms --
# Which share buttons to show. Buttons appear in the order listed here.
# Available: twitter, linkedin, facebook, whatsapp, telegram, email, copy
share:
  - twitter
  - linkedin
  - whatsapp
  - telegram
  - copy

# -- Funding --
# Link to a sponsorship/donation page (GitHub Sponsors, Patreon, etc.).
# Shows as a heart icon in the site footer and in the RSS <podcast:funding>
# tag. The label for the RSS feed lives in labels.funding below. Leave
# empty to disable.
funding_url: https://github.com/sponsors/mluggy

# -- Transcription --
# When true, the CI pipeline runs AWS Transcribe on new episodes that don't
# have an existing .srt file. Requires AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY,
# AWS_REGION, and AWS_S3_BUCKET to be set as GitHub repository secrets.
# The transcription language is derived automatically from language + country
# above (e.g. language: en + country: US → en-US).
transcribe: true

# Gemini model used to correct AWS Transcribe output (runs only when
# GEMINI_API_KEY is set and a new SRT was generated). Preview models are
# updated often; if you see "model not found" errors, bump this to whatever
# is current at https://ai.google.dev/gemini-api/docs/models
gemini_model: gemini-pro-latest

# -- Analytics --
# Google Analytics 4 measurement ID (e.g. G-A1B2C3D4E5).
# Leave empty to disable.
ga_measurement_id: "G-T4KH0ESGWB"

# Facebook/Meta Pixel ID (e.g. 582193047164938).
# Leave empty to disable.
fb_pixel_id: ""

# X (previouslyTwitter) Pixel ID (e.g. o5lgk).
# Leave empty to disable.
x_pixel_id: ""

# LinkedIn Partner ID (e.g. 4873561).
# Leave empty to disable.
linkedin_partner_id: ""

# Microsoft Clarity Project ID (e.g. k7f3np2qxc).
# Free heatmaps and session recordings.
# Leave empty to disable.
clarity_project_id: ""

# Microsoft UET Tag ID (e.g. 96385274).
# Bing Ads conversion tracking. Leave empty to disable.
microsoft_uet_id: ""

# TikTok Pixel ID (e.g. CJMB5ABC87U6E7A0B1FG).
# Leave empty to disable.
tiktok_pixel_id: ""

# Snapchat Pixel ID (e.g. 8a3f5c92-b1d4-47e6-9f0a-2c8d7e6b4a1f).
# Leave empty to disable.
snap_pixel_id: ""

# -- Fonts --
# Google Fonts family name for body text and OG images.
# Browse https://fonts.google.com to pick a font.
# The Regular (400) weight is auto-downloaded on first build and cached to
# scripts/fonts/. Noto Sans Regular is bundled as the default.
# Examples:
#   font: Noto Sans              (default — bundled, no download needed)
#   font: Inter
#   font: Noto Sans Hebrew       (Hebrew/RTL)
#   font: Noto Sans Arabic       (Arabic/RTL)
#   font: Noto Sans JP           (Japanese)
#   font: Noto Sans SC           (Chinese Simplified)
#   font: Noto Sans KR           (Korean)
#   font: Noto Sans Thai         (Thai)
font: Noto Sans Hebrew

# -- OG image font (optional override) --
# By default, OG images use the font above (auto-downloaded from Google Fonts).
# Set og_font to a local .ttf path to override — useful for custom weights,
# variants, or fonts not on Google Fonts.
# Examples:
#   og_font: ""                              (default — uses font above)
#   og_font: scripts/fonts/MyFont-Bold.ttf   (custom local .ttf)
og_font: ""

# -- OG image text area --
# Rectangle (in pixels on the 1200x630 OG canvas) where episode titles are
# drawn over the cover art background. Adjust to match your cover art
# layout.
# align: horizontal text alignment - "left", "center", or "right".
# Automatically follows text direction (RTL/LTR) so "left" means "start"
# and "right" means "end" regardless of language.
# valign: vertical text alignment - "top", "middle", or "bottom".
og_text_area:
  top: 1100
  left: 100
  width: 2466
  height: 1466
  align: center
  valign: middle

# -- OG image text color --
# Color of the episode title overlay. Any valid CSS color (hex, rgb, etc.).
# Defaults to white if unset.
og_text_color: "#ffffff"

# -- Theme --
# Brand color - used for buttons, active states, progress bar, equalizer,
# and OG images. Any valid CSS hex color.
accent_color: "#ff4d00"

# Initial color scheme - "dark" or "light".
# Users can toggle via the sun/moon icon; their choice is saved in a cookie.
# If unset, follows the OS preference (prefers-color-scheme).
default_theme: dark

# Page background color for each theme.
bg_dark: "#0a0a0b"
bg_light: "#fafaf9"

# Card and panel background - slightly offset from the page background to
# create depth (header, footer, player, episode cards).
surface_dark: "#131315"
surface_light: "#ffffff"

# -- Legacy URL redirects (optional) --
# If migrating from another platform (Transistor, Anchor, Buzzsprout, etc.),
# set a JavaScript regex that captures the episode number from old URLs. The
# middleware matches incoming /episodes/... paths and 301-redirects to /{N},
# where {N} is capture group 1. Non-matching /episodes/... paths redirect to /.
#
# The regex runs against the URL-decoded path (including "/episodes/").
# Quote with double quotes and escape backslashes: "\\d+" - NOT "\d+".
# Capture group 1 MUST be the episode number.
#
# Single-platform examples:
#   Transistor, trailing number     "/episodes/.+-(\\d+)$"
#       /episodes/my-great-show-34      → /34
#   Transistor, zero-padded number  "/episodes/.+-0*(\\d+)$"
#       /episodes/my-great-show-002   → /2  (0* eats leading zeros)
#   Transistor, leading number      "/episodes/(\\d+)-"
#       /episodes/34-my-great-show      → /34
#   Hebrew "פרק" (episode) prefix   "/episodes/פרק-(\\d+)"
#       /episodes/פרק-34-שם-הפרק        → /34
#   Buzzsprout (showid-epnum-slug)  "/episodes/\\d+-(\\d+)-"
#       /episodes/123456-34-my-show     → /34
#   Podbean "ep-N-" style           "/episodes/ep-(\\d+)-"
#       /episodes/ep-34-my-show         → /34
#   Simplecast short-id             "/episodes/[a-z0-9]+-(\\d+)$"
#       /episodes/abc123-34             → /34
#
# Leave empty to disable.
legacy_slug_pattern: "/episodes/פרק-(\\d+)"

# -- Search ranking weights --
# Controls BM25 field boosting for full-text search (powered by Orama).
# Higher values make matches in that field rank higher in results.
search_weights:
  title: 10
  description: 5
  transcript: 2

# =============================================================================
# UI Labels (for localization)
# =============================================================================
# All user-visible strings live here so the app can be fully localized by
# replacing the values below. Keys are referenced as config.labels.<key>.
#
# For a Hebrew example, see: https://github.com/mluggy/podcast/blob/main/podcast.yaml
labels:
  # Platform names (shown next to icons in header and player)
  spotify: ספוטיפיי
  apple: אפל
  youtube: יוטיוב
  amazon: אמזון
  rss: RSS

  # Navigation
  season: עונה
  episode: פרק
  new: חדש
  search: חיפוש בכל הפרקים
  no_results: לא נמצאו פרקים

  # Player controls
  play: נגן
  pause: השהה
  previous_episode: פרק קודם
  next_episode: פרק הבא
  skip_back: 15 שניות אחורה
  skip_forward: 15 שניות קדימה
  subtitles: כתוביות
  playback_speed: מהירות השמעה
  download: הורדה

  # Theme toggle
  light_mode: מצב בהיר
  dark_mode: מצב כהה

  # Sharing (shown in episode detail and episode list)
  share: שיתוף
  copy_link: העתק קישור

  # Footer - leave powered_by empty ("") to hide the "powered by coil" link.
  powered_by: נבנה עם

  # Label for the funding link in the RSS <podcast:funding> tag (not
  # shown on the site). Only used when funding_url is set.
  funding: תמכו בפודקאסט

  # Keyboard shortcut for search: Ctrl/Cmd + this key (in addition to F).
  # Useful for non-Latin keyboards where Ctrl+F may map to a different character.
  # Example: "כ" for Hebrew. Leave empty if not needed.
  search_shortcut: "כ"

  # Legal pages - omit any of the four keys below to hide that page and its
  # footer link. Setting only the title (not the _text) still hides the page.
  terms: תנאי שימוש
  terms_text: |
    זהו פודקאסט אישי וחינוכי המסופק ללא תשלום וללא אחריות מכל סוג. התוכן משקף את דעותיו של המנחה ומוגש למטרות מידע בלבד - אינו מהווה ייעוץ מקצועי, משפטי, רפואי, פיננסי או כל סוג אחר.

    בשימוש באתר זה הנכם מסכימים כי המפעילים אינם אחראים להחלטות שתקבלו על בסיס התוכן. ניתן להאזין, לשתף ולהפנות לפרקים לשימוש אישי וחינוכי. סימנים מסחריים ותוכן של צדדים שלישיים שייכים לבעליהם.
  privacy: פרטיות
  privacy_text: |
    אנו מכבדים את פרטיותכם. אתר זה אינו דורש חשבון ואינו אוסף מידע אישי שלא מסרתם מרצונכם. עוגייה קטנה שומרת את ערכת העיצוב (בהיר/כהה) ואת בחירת העוגיות שלכם.

    אם תאשרו אנליטיקס, אנו משתמשים בשירותי צד שלישי הבאים לניטור דפוסי תנועה אנונימיים:
    {{#if ga_measurement_id}}• Google Analytics — מדידת תנועה מצרפית ואנונימית{{/if}}
    {{#if fb_pixel_id}}• Meta (Facebook) Pixel — פעילות אנונימית באתר למדידת קהלים{{/if}}
    {{#if x_pixel_id}}• X (Twitter) Pixel — התאמת קהלים ומעקב המרות{{/if}}
    {{#if linkedin_partner_id}}• LinkedIn Insight Tag — התאמת קהלים ומעקב המרות{{/if}}
    {{#if clarity_project_id}}• Microsoft Clarity — מפות חום והקלטות הפעלה{{/if}}
    {{#if microsoft_uet_id}}• Microsoft Advertising (UET) — מעקב המרות{{/if}}
    {{#if tiktok_pixel_id}}• TikTok Pixel — התאמת קהלים ומעקב המרות{{/if}}
    {{#if snap_pixel_id}}• Snapchat Pixel — התאמת קהלים ומעקב המרות{{/if}}

    איננו מוכרים מידע. ניתן לבטל הסכמה בכל עת על ידי מחיקת העוגיות של אתר זה. לשאלות פנו למחבר.

  # Cookie consent - leave cookie_consent empty ("") to disable the banner
  # entirely and always-track (current behavior).
  cookie_consent: ""
  cookie_accept: אישור
  cookie_decline: דחייה
