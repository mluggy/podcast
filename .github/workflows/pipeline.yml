name: Coil Pipeline

on:
  push:
    branches: ['*']
  workflow_dispatch:
    inputs:
      fix_srt:
        description: 'SRT basenames to re-run the Gemini fix on (space-separated, e.g. "s2e54.srt")'
        required: false
        default: ''
  # Forks running a Daily Digest workflow push with the default GITHUB_TOKEN,
  # which by design does NOT fire the push event (anti-recursion). Listen for
  # its completion so the pipeline still auto-runs. Dormant in forks that
  # don't have a "Daily Digest" workflow.
  workflow_run:
    workflows: ['Daily Digest']
    types: [completed]

permissions:
  contents: write

jobs:
  process:
    if: >-
      (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success')
      && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          # Full history so the fix-list step can diff the pushed range for
          # changed .txt transcripts (LFS still only smudges HEAD's files).
          fetch-depth: 0

      - name: Install ffmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3
        with:
          ffmpeg-version: release

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Node.js dependencies
        run: npm ci

      # ─── Read podcast config ──────────────────────────────

      - name: Read podcast config
        id: config
        run: |
          TRANSCRIBE=$(python -c "import yaml; c=yaml.safe_load(open('podcast.yaml')); print('true' if c.get('transcribe') else 'false')")
          echo "transcribe=$TRANSCRIBE" >> $GITHUB_OUTPUT

      # ─── Episode Processing (Python) ───────────────────────

      - name: Convert WAV to MP3
        run: |
          CONVERTED=$(python scripts/convert_wav.py episodes/)
          echo "converted<<EOF" >> $GITHUB_OUTPUT
          echo "$CONVERTED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        id: convert

      - name: Transcribe MP3 to SRT
        if: steps.config.outputs.transcribe == 'true' && env.AWS_ACCESS_KEY_ID != ''
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          # Optional: lets transcribe.py pull gitignored MP3s back from R2
          # (canonical audio store) so a deleted .srt gets re-transcribed.
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          NEW_SRTS=$(python scripts/transcribe.py episodes/)
          echo "new_srts<<EOF" >> $GITHUB_OUTPUT
          echo "$NEW_SRTS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        id: transcribe

      # SRTs to fix = freshly transcribed ones + existing SRTs whose proofread
      # .txt was added/updated in this push + any explicitly requested via the
      # workflow_dispatch fix_srt input.
      - name: Determine SRT files to fix
        id: fixlist
        run: |
          FILES="${{ steps.transcribe.outputs.new_srts }}"
          if [ "${{ github.event_name }}" = "push" ]; then
            BEFORE="${{ github.event.before }}"
            if [ -n "$BEFORE" ] && [ "$BEFORE" != "0000000000000000000000000000000000000000" ] && git cat-file -e "$BEFORE" 2>/dev/null; then
              RANGE="$BEFORE..HEAD"
            else
              RANGE="HEAD^..HEAD"
            fi
            for txt in $(git diff --name-only --diff-filter=AM "$RANGE" -- 'episodes/*.txt' 2>/dev/null || true); do
              srt="episodes/$(basename "${txt%.txt}").srt"
              [ -f "$srt" ] && FILES="$FILES $(basename "$srt")"
            done
          fi
          FILES="$FILES ${{ inputs.fix_srt }}"
          FILES=$(echo $FILES | tr ' ' '\n' | grep -v '^$' | sort -u | tr '\n' ' ' | sed 's/ *$//')
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "Fixing: ${FILES:-nothing}"

      - name: Fix SRT with Gemini
        if: steps.fixlist.outputs.files != '' && env.GEMINI_API_KEY != ''
        # A failed fix keeps the raw SRT and exits non-zero; keep the pipeline
        # deploying but leave the step visibly red on the run page.
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/fix_srt.py episodes/ --srt-files ${{ steps.fixlist.outputs.files }}

      - name: Regenerate RSS feed
        run: |
          python scripts/generate_feed.py episodes/

      - name: Generate OG images
        run: |
          node scripts/yaml-to-json.js
          node scripts/generate-og.js

      # ─── Commit processed episodes ─────────────────────────

      - name: Commit generated files
        run: |
          git config user.name "coil[bot]"
          git config user.email "coil[bot]@users.noreply.github.com"
          # Use nullglob so missing extensions (e.g. transcribe=false → no .srt
          # yet, or a fresh fork with no episodes) don't fatally stop the job.
          # MP3s are uploaded to R2 (canonical) and gitignored — never committed.
          shopt -s nullglob
          files=(episodes/*.srt episodes/*.txt episodes/*.png episodes/*.jpg)
          shopt -u nullglob
          git add episodes/episodes.yaml
          [ -f episodes/rss.xml ] && git add episodes/rss.xml
          [ ${#files[@]} -gt 0 ] && git add "${files[@]}"
          git diff --cached --quiet || git commit -m "Auto-process episodes [skip ci]"
          git add -u episodes/*.wav 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Remove converted WAV files [skip ci]"
          # Rebase on any new upstream commits (e.g. concurrent push races)
          # before pushing. Fall back to a single retry on the push itself.
          git pull --rebase origin "$GITHUB_REF_NAME" || true
          git push || (git pull --rebase origin "$GITHUB_REF_NAME" && git push)

      # ─── Website Build (Node.js) ───────────────────────────

      - name: Build website
        env:
          # Optional Ed25519 PEM. One key, two purposes:
          #   - scripts/generate-signing-key.js bakes the public key into
          #     /.well-known/http-message-signatures-directory at build time.
          #   - functions/oauth/[[path]].js signs EdDSA JWS tokens at
          #     /oauth/token (also publishing the same JWK at /oauth/jwks.json).
          # Generate a fresh key with `node scripts/generate-signing-key.js --new-key`.
          SIGNING_PRIVATE_KEY: ${{ secrets.SIGNING_PRIVATE_KEY }}
        run: npm run build

      # ─── Deploy ─────────────────────────────────────────────

      - name: Sync media to Cloudflare R2
        if: env.R2_ACCESS_KEY_ID != ''
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          python scripts/sync_r2.py episodes/

      - name: Deploy to Cloudflare Pages
        if: env.CLOUDFLARE_API_TOKEN != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages deploy dist --project-name="${{ vars.CLOUDFLARE_PROJECT_NAME || 'your-pages-project' }}"
